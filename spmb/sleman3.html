<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Expert System SPMB SMPN Sleman 2026</title>

<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --primary:#1d4ed8;
  --primary2:#2563eb;
  --danger:#dc2626;
  --success:#16a34a;
  --warning:#d97706;
  --text:#111827;
  --muted:#6b7280;
  --border:#dbe3ef;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
}

.container{
  width:min(1100px,95%);
  margin:auto;
  padding:20px 0 80px;
}

.hero{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  padding:28px;
  border-radius:20px;
  margin-bottom:20px;
}

.hero h1{
  margin:0 0 10px;
  font-size:2rem;
}

.hero p{
  margin:0;
  opacity:.95;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 5px 15px rgba(0,0,0,.06);
}

.card h2{
  margin-top:0;
  font-size:1.2rem;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

@media(max-width:800px){
  .grid{
    grid-template-columns:1fr;
  }
}

label{
  display:block;
  margin-bottom:6px;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:15px;
}

.checks{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media(max-width:700px){
  .checks{
    grid-template-columns:1fr;
  }
}

.check-item{
  background:#f9fbff;
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

button:hover{
  background:#1e40af;
}

.result{
  margin-top:20px;
}

.route{
  border:2px solid var(--border);
  border-radius:16px;
  padding:18px;
  margin-bottom:18px;
}

.route.allowed{
  border-color:var(--success);
  background:#f0fff5;
}

.route.denied{
  border-color:var(--danger);
  background:#fff5f5;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:13px;
  font-weight:bold;
  margin-bottom:10px;
}

.badge.ok{
  background:#dcfce7;
  color:#166534;
}

.badge.no{
  background:#fee2e2;
  color:#991b1b;
}

ul{
  padding-left:20px;
}

.timeline{
  margin-top:10px;
}

.timeline-item{
  border-left:4px solid var(--primary);
  padding-left:14px;
  margin-bottom:16px;
}

.timeline-item h4{
  margin:0 0 5px;
}

.small{
  color:var(--muted);
  font-size:14px;
}

a{
  color:var(--primary);
  text-decoration:none;
}

.notice{
  background:#fff7ed;
  border:1px solid #fdba74;
  padding:14px;
  border-radius:12px;
  margin-top:14px;
}

.footer{
  text-align:center;
  margin-top:40px;
  color:var(--muted);
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h1>Expert System SPMB SMPN Sleman 2026</h1>
  <p>
    Sistem pakar untuk menentukan jalur yang bisa ditempuh calon siswa SMP Negeri Sleman,
    syarat dokumen, serta jadwal kegiatan yang harus diikuti.
  </p>
</div>

<div class="card">
  <h2>Data Calon Siswa</h2>

  <div class="grid">

    <div>
      <label>Usia pada 1 Juli 2026</label>
      <input type="number" id="age" placeholder="Contoh: 12">
    </div>

    <div>
      <label>Tahun Lulus SD</label>
      <select id="graduateYear">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023 atau sebelumnya</option>
      </select>
    </div>

    <div>
      <label>Domisili KK</label>
      <select id="kk">
        <option value="sleman">Kabupaten Sleman</option>
        <option value="outside">Luar Sleman</option>
      </select>
    </div>

    <div>
      <label>Asal SD</label>
      <select id="schoolOrigin">
        <option value="diy">DIY / Sleman</option>
        <option value="outsideDIY">Luar DIY</option>
      </select>
    </div>

    <div>
      <label>Masa KK</label>
      <select id="kkDuration">
        <option value="yes">≥ 1 Tahun</option>
        <option value="no">< 1 Tahun</option>
      </select>
    </div>

    <div>
      <label>Nilai Gabungan (NG)</label>
      <input type="number" id="ng" placeholder="Contoh: 289.5">
      <div class="small">
        Gunakan simulator NG terlebih dahulu:
        <a href="https://tkatkad.github.io/smp-sleman/" target="_blank">
          Kalkulator NG Sleman
        </a>
      </div>
    </div>

  </div>

  <br>

  <div class="checks">

    <div class="check-item">
      <label><input type="checkbox" id="radius"> Tinggal dalam radius sekolah</label>
    </div>

    <div class="check-item">
      <label><input type="checkbox" id="kkm"> Memiliki KKM resmi Dinsos Sleman</label>
    </div>

    <div class="check-item">
      <label><input type="checkbox" id="disability"> Penyandang disabilitas</label>
    </div>

    <div class="check-item">
      <label><input type="checkbox" id="assessment"> Punya asesmen RSUD Sleman</label>
    </div>

    <div class="check-item">
      <label><input type="checkbox" id="nationalAchievement"> Punya prestasi nasional resmi</label>
    </div>

    <div class="check-item">
      <label><input type="checkbox" id="regionalAchievement"> Prestasi mewakili Sleman</label>
    </div>

    <div class="check-item">
      <label><input type="checkbox" id="mutation"> Orang tua mutasi kerja</label>
    </div>

    <div class="check-item">
      <label><input type="checkbox" id="teacherChild"> Anak guru</label>
    </div>

    <div class="check-item">
      <label><input type="checkbox" id="tkad"> Sudah mengikuti TKAD</label>
    </div>

  </div>

  <br>

  <button onclick="analyze()">Analisis Jalur</button>

</div>

<div id="results" class="result"></div>

<div class="footer">
  Expert System SPMB SMPN Sleman 2026 •
</div>

</div>

<script>

const schedules = {

  prestasiKhusus: [
    ["Pengajuan akun","9-10 Juni 2026","Online: https://sleman.spmb.id"],
    ["Verifikasi berkas","9-10 Juni 2026 08.00-13.00","Sekolah tujuan pertama"],
    ["Pendaftaran","9-10 Juni 2026","Online: https://sleman.spmb.id"],
    ["Pengumuman","11 Juni 2026 08.00","Sekolah"],
    ["Daftar ulang","11 Juni 2026 09.00-11.30","Sekolah penerima"]
  ],

  domisiliRadius: [
    ["Pengajuan akun","17-18 Juni 2026","Online: https://sleman.spmb.id"],
    ["Verifikasi","17-18 Juni 2026 08.00-13.00","Sekolah tujuan"],
    ["Pendaftaran","17-18 Juni 2026","Online"],
    ["Pengumuman","19 Juni 2026 08.00","Sekolah"],
    ["Daftar ulang","19 Juni 2026 09.00-11.30","Sekolah penerima"]
  ],

  prestasiUmum: [
    ["Pengajuan akun","23-24 Juni 2026","Online"],
    ["Verifikasi","23-24 Juni 2026","Sekolah pilihan pertama"],
    ["Pendaftaran","23-24 Juni 2026","Online"],
    ["Pengumuman","25 Juni 2026","Sekolah"],
    ["Daftar ulang","25 Juni 2026 09.00-13.00","Sekolah penerima"]
  ]

};

function routeHTML(title, allowed, reasons, docs, timeline){

  return `
    <div class="route ${allowed ? 'allowed':'denied'}">

      <div class="badge ${allowed ? 'ok':'no'}">
        ${allowed ? 'BERHAK MENDAFTAR' : 'TIDAK MEMENUHI SYARAT'}
      </div>

      <h2>${title}</h2>

      <h3>Analisis</h3>
      <ul>
        ${reasons.map(r=>`<li>${r}</li>`).join("")}
      </ul>

      ${
        allowed ? `
        <h3>Dokumen yang Harus Disiapkan</h3>
        <ul>
          ${docs.map(d=>`<li>${d}</li>`).join("")}
        </ul>

        <h3>Jadwal & Kegiatan</h3>

        <div class="timeline">
          ${timeline.map(t=>`
            <div class="timeline-item">
              <h4>${t[0]}</h4>
              <div><b>Waktu:</b> ${t[1]}</div>
              <div><b>Lokasi:</b> ${t[2]}</div>
            </div>
          `).join("")}
        </div>
        ` : ""
      }

    </div>
  `;
}

function analyze(){

  const age = Number(document.getElementById("age").value);
  const graduateYear = document.getElementById("graduateYear").value;
  const kk = document.getElementById("kk").value;
  const schoolOrigin = document.getElementById("schoolOrigin").value;
  const kkDuration = document.getElementById("kkDuration").value;
  const ng = Number(document.getElementById("ng").value);

  const radius = document.getElementById("radius").checked;
  const kkm = document.getElementById("kkm").checked;
  const disability = document.getElementById("disability").checked;
  const assessment = document.getElementById("assessment").checked;
  const nationalAchievement = document.getElementById("nationalAchievement").checked;
  const regionalAchievement = document.getElementById("regionalAchievement").checked;
  const mutation = document.getElementById("mutation").checked;
  const teacherChild = document.getElementById("teacherChild").checked;
  const tkad = document.getElementById("tkad").checked;

  let html = "";

  let globalProblems = [];

  if(age > 15){
    globalProblems.push("Usia melebihi 15 tahun pada 1 Juli 2026.");
  }

  if(graduateYear === "2023"){
    globalProblems.push("Lulusan terlalu lama untuk syarat umum SPMB.");
  }

  if(globalProblems.length){
    document.getElementById("results").innerHTML = `
      <div class="route denied">
        <div class="badge no">TIDAK MEMENUHI SYARAT UMUM</div>
        <h2>Siswa Tidak Dapat Mengikuti SPMB SMPN Sleman</h2>

        <ul>
          ${globalProblems.map(p=>`<li>${p}</li>`).join("")}
        </ul>
      </div>
    `;
    return;
  }

  // DOMISILI RADIUS
  {
    let ok = true;
    let reasons = [];

    if(kk !== "sleman"){
      ok = false;
      reasons.push("Harus ber-KK Sleman.");
    } else {
      reasons.push("KK Sleman memenuhi.");
    }

    if(kkDuration !== "yes"){
      ok = false;
      reasons.push("KK belum 1 tahun.");
    }

    if(!radius){
      ok = false;
      reasons.push("Rumah tidak dalam radius sekolah.");
    }

    if(schoolOrigin === "outsideDIY"){
      ok = false;
      reasons.push("Lulusan luar DIY umumnya tidak diprioritaskan di jalur domisili.");
    }

    if(ok){
      reasons.push("Memenuhi syarat jalur Domisili Radius.");
    }

    html += routeHTML(
      "Jalur Domisili Radius",
      ok,
      reasons,
      [
        "KK",
        "Akta lahir",
        "Surat lulus",
        "Hasil TKA",
        "Hasil TKAD",
        "Surat tanggung jawab mutlak"
      ],
      schedules.domisiliRadius
    );
  }

  // AFIRMASI
  {
    let ok = true;
    let reasons = [];

    if(kk !== "sleman"){
      ok = false;
      reasons.push("Afirmasi wajib penduduk Sleman.");
    }

    if(!kkm && !(disability && assessment)){
      ok = false;
      reasons.push("Harus punya KKM resmi atau asesmen disabilitas.");
    }

    if(ok){
      reasons.push("Memenuhi syarat jalur afirmasi.");
    }

    html += routeHTML(
      "Jalur Afirmasi",
      ok,
      reasons,
      [
        "KK",
        "Akta lahir",
        "Surat lulus",
        "KKM resmi atau asesmen RSUD",
        "Hasil TKA/TKAD"
      ],
      schedules.domisiliRadius
    );
  }

  // PRESTASI UMUM
  {
    let ok = true;
    let reasons = [];

    if(ng < 245){
      ok = false;
      reasons.push("NG kurang dari 245.");
    } else {
      reasons.push("NG memenuhi minimal 245.");
    }

    if(schoolOrigin === "outsideDIY" && !tkad){
      ok = false;
      reasons.push("Lulusan luar DIY wajib TKAD.");
    }

    if(ok){
      reasons.push("Memenuhi syarat jalur Prestasi Umum.");
    }

    html += routeHTML(
      "Jalur Prestasi Umum",
      ok,
      reasons,
      [
        "KK",
        "Akta lahir",
        "Surat lulus",
        "Hasil TKA/TKAD",
        "Sertifikat prestasi (jika ada)"
      ],
      schedules.prestasiUmum
    );
  }

  // PRESTASI KHUSUS
  {
    let ok = true;
    let reasons = [];

    if(!nationalAchievement){
      ok = false;
      reasons.push("Tidak memiliki prestasi nasional resmi.");
    }

    if(schoolOrigin === "outsideDIY" && !tkad){
      ok = false;
      reasons.push("Lulusan luar DIY wajib TKAD.");
    }

    if(ok){
      reasons.push("Memenuhi syarat jalur Prestasi Khusus.");
    }

    html += routeHTML(
      "Jalur Prestasi Khusus",
      ok,
      reasons,
      [
        "Piagam prestasi nasional",
        "KK",
        "Hasil TKA/TKAD",
        "Surat lulus"
      ],
      schedules.prestasiKhusus
    );
  }

  // PRESTASI DAERAH
  {
    let ok = true;
    let reasons = [];

    if(!regionalAchievement){
      ok = false;
      reasons.push("Tidak memiliki prestasi mewakili Sleman.");
    }

    if(kk !== "sleman"){
      ok = false;
      reasons.push("Prestasi daerah umumnya untuk wakil Sleman.");
    }

    if(ok){
      reasons.push("Memenuhi syarat jalur Prestasi Daerah.");
    }

    html += routeHTML(
      "Jalur Prestasi Daerah",
      ok,
      reasons,
      [
        "Piagam prestasi daerah",
        "KK",
        "Hasil TKA/TKAD",
        "Surat lulus"
      ],
      schedules.prestasiKhusus
    );
  }

  // MUTASI
  {
    let ok = true;
    let reasons = [];

    if(!mutation && !teacherChild){
      ok = false;
      reasons.push("Tidak memiliki SK mutasi atau status anak guru.");
    }

    if(schoolOrigin === "outsideDIY" && !tkad){
      ok = false;
      reasons.push("Lulusan luar DIY wajib TKAD.");
    }

    if(ok){
      reasons.push("Memenuhi syarat jalur Mutasi.");
    }

    html += routeHTML(
      "Jalur Mutasi",
      ok,
      reasons,
      [
        "SK mutasi",
        "SK guru",
        "KK",
        "Akta lahir",
        "Hasil TKA/TKAD"
      ],
      schedules.domisiliRadius
    );
  }

  html += `
    <div class="notice">
      <b>Catatan Penting:</b><br><br>

      • Sistem ini adalah expert system berbasis aturan juknis SPMB SMPN Sleman 2026.<br>
      • Hasil ini bukan keputusan resmi panitia SPMB.<br>
      • Validasi akhir tetap dilakukan oleh sistem dan panitia resmi Sleman.<br>
      • Selalu cek juknis terbaru dan situs resmi:
      <a href="https://sleman.spmb.id" target="_blank">sleman.spmb.id</a>
    </div>
  `;

  document.getElementById("results").innerHTML = html;

}

</script>

</body>
</html>
