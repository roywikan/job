<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 🔁 Meta Refresh Redirect (fallback untuk browser tanpa JS) -->
  <meta http-equiv="refresh" content="0;url=https://job.web.id/spmb/smpn-sleman/">
  
  <!-- 🔁 JavaScript Redirect (lebih cepat & bisa track) -->
  <script>
    (function() {
      const target = 'https://job.web.id/spmb/smpn-sleman/';
      
      // Redirect segera
      if (window.location.href !== target) {
        // Ganti history agar tidak bisa "back" ke URL lama
        window.location.replace(target);
      }
    })();
  </script>
  
  <title>Redirecting...</title>
  <style>
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      text-align: center; 
      padding: 3rem 1rem; 
      background: #f0fff4; 
      color: #333;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #28a745;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #155724; font-weight: bold; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>
    🔄 Mengalihkan ke halaman baru...<br>
    <small>Jika tidak otomatis, <a href="https://job.web.id/spmb/smpn-sleman/">klik di sini</a></small>
  </p>
  
  <!-- 🔁 SEO: Canonical URL -->
  <link rel="canonical" href="https://job.web.id/spmb/smpn-sleman/">
  
  <!-- 🔁 SEO: Informasi redirect untuk search engine -->
  <meta name="robots" content="noindex, follow">
</body>
</html>
