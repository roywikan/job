<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jalur SPMB Kota Yogyakarta Logic System</title>
<meta name="description" content="Analisis jalur SPMB SMPN Kota Yogyakarta 2026. Cek syarat, domisili, dan peluang masuk.">
<!-- Load CSS Utama -->
<link rel="stylesheet" href="https://job.web.id/smart.css">
<link rel="stylesheet" href="assets/css/kota.css">
<link rel="stylesheet" href="assets/css/smpn-kota.css">

<!-- Load Dependencies -->
<script src="config.js"></script>
<script src="data-kota.js"></script>
<script src="helpers.js"></script>
<script src="engine.js"></script>
<script src="https://job.web.id/smart.js"></script>

<style>
  /* INLINE CSS UNTUK JAMINAN LAYOUT AWAL */
  .container { max-width: 800px; margin: 0 auto; padding: 15px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
  @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
  
  label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.95rem; }
  input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
  
  .card { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .hero { background: linear-gradient(135deg, #1d4ed8, #2563eb); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
  
  .hidden { display: none; }
  .section-title { font-size: 1.1rem; font-weight: bold; margin: 20px 0 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <h1>SPMB SMPN Kota Yogyakarta</h1>
    <p>Sistem Analisis Jalur & Peluang Masuk 2026</p>
  </div>

  <div class="card">
    <h2>Data Calon Siswa</h2>
    
    <!-- ===== KK ASAL (Paling Atas) ===== -->
    <label for="kk">🏠 Domisili KK Siswa:</label>
    <select id="kk" style="border: 2px solid var(--primary, blue); background: #f8fbff;">
      <option value="kota">Kota Yogyakarta</option>
      <option value="diy">Kab/Kota lain di DIY</option>
      <option value="outsideDIY">Luar DIY</option>
    </select>
    <div class="small" style="color: #666; margin-bottom: 15px;">Pilih sesuai Kartu Keluarga (KK)</div>

    <div class="grid">
      <div>
        <label>Usia pada 1 Juli 2026:</label>
        <select id="age">
          <option value="12" selected>12 tahun</option>
          <option value="13">13 tahun</option>
          <option value="14">14 tahun</option>
        </select>
      </div>
      <div>
        <label>Tahun Lulus SD:</label>
        <select id="tahunLulus">
          <option value="2026">2026 (TKA+TKAD)</option>
          <option value="2025">2025 (ASPD)</option>
        </select>
      </div>
      <div>
        <label>Asal SD:</label>
        <select id="asalSD">
          <option value="kota">SD Kota Yogyakarta</option>
          <option value="diy">SD DIY (Luar Kota)</option>
          <option value="luar">SD Luar DIY</option>
        </select>
      </div>
      <div>
        <label>Prestasi Nasional?</label>
        <select id="prestasiNasional">
          <option value="no">Tidak</option>
          <option value="yes">Ya (OSN/O2SN/FLS2N)</option>
        </select>
      </div>
    </div>

    <!-- ===== NILAI AKADEMIK ===== -->
    <div class="section-title">📊 Nilai Akademik</div>
    <div class="grid">
      <div>
        <label id="label-tes1">TKA Matematika:</label>
        <input type="number" id="tes1" placeholder="0 - 100" max="100">
      </div>
      <div>
        <label id="label-tes2">TKA B. Indonesia:</label>
        <input type="number" id="tes2" placeholder="0 - 100" max="100">
      </div>
      <div>
        <label id="label-tes3">TKAD/ASPD IPAS:</label>
        <input type="number" id="tes3" placeholder="0 - 100" max="100">
      </div>
      <div>
        <label>Prestasi Non-Akademik (0-7.5):</label>
        <input type="number" id="prestasiNon" placeholder="0.00" max="7.5" step="0.01">
      </div>
    </div>

    <!-- ===== NILAI RAPOR ===== -->
    <div class="section-title">📖 Rata-rata Rapor</div>
    <p class="small">Isi rata-rata nilai rapor Semester 7 s.d. 11 (Total 5 mapel × 5 semester)</p>
    <div class="grid">
      <div><label>Agama:</label><input type="number" id="rapor_agama" step="0.01"></div>
      <div><label>Pancasila:</label><input type="number" id="rapor_pancasila" step="0.01"></div>
      <div><label>B. Indonesia:</label><input type="number" id="rapor_indo" step="0.01"></div>
      <div><label>Matematika:</label><input type="number" id="rapor_mtk" step="0.01"></div>
      <div style="grid-column: 1/-1;"><label>IPAS:</label><input type="number" id="rapor_ipas" step="0.01"></div>
    </div>
    
    <!-- ===== LOKASI (Hanya Muncul jika KK=Kota) ===== -->
    <div id="lokasi-container" class="hidden" style="margin-top:20px; border-top:2px dashed #ccc; padding-top:15px;">
      <div class="section-title">📍 Lokasi Domisili (Untuk Radius)</div>
      <div class="grid">
        <div>
          <label>Latitude RW:</label>
          <input type="number" id="lat" step="0.0001" placeholder="-7.xxxx">
        </div>
        <div>
          <label>Longitude RW:</label>
          <input type="number" id="lng" step="0.0001" placeholder="110.xxxx">
        </div>
      </div>
      <button type="button" id="btn-geo" style="margin-top:10px; width:100%;">📍 Gunakan Lokasi Saya</button>
    </div>

    <button id="btn-analyze" style="margin-top: 20px; font-size: 1.1rem; padding: 15px;">🔍 Analisis Jalur</button>
  </div>

  <div id="result"></div>
</div>

<script>
// ================= UTILS =================
// Fungsi aman untuk mengambil value (menghindari error NULL)
function getVal(id) {
  const el = document.getElementById(id);
  if (!el) return 0;
  return parseFloat(el.value) || 0;
}

function getCheck(id) {
  const el = document.getElementById(id);
  return el ? el.checked : false;
}

// ================= LOGIKA UTAMA =================

// 1. Toggle Tampilan Tahun (2025/2026)
function updateLabels() {
  const year = document.getElementById('tahunLulus').value;
  if (year === '2026') {
    document.getElementById('label-tes1').innerText = 'TKA Matematika:';
    document.getElementById('label-tes2').innerText = 'TKA B. Indonesia:';
    document.getElementById('label-tes3').innerText = 'TKAD IPAS:';
  } else {
    document.getElementById('label-tes1').innerText = 'ASPD Matematika:';
    document.getElementById('label-tes2').innerText = 'ASPD B. Indonesia:';
    document.getElementById('label-tes3').innerText = 'ASPD IPA:';
  }
}
document.getElementById('tahunLulus').addEventListener('change', updateLabels);

// 2. Toggle Lokasi
document.getElementById('kk').addEventListener('change', function() {
  const loc = document.getElementById('lokasi-container');
  if (this.value === 'kota') {
    loc.classList.remove('hidden');
  } else {
    loc.classList.add('hidden');
  }
});

// 3. Geolocation
document.getElementById('btn-geo').addEventListener('click', function() {
  if (navigator.geolocation) {
    this.textContent = '📍 Mendapatkan lokasi...';
    navigator.geolocation.getCurrentPosition(pos => {
      document.getElementById('lat').value = pos.coords.latitude.toFixed(4);
      document.getElementById('lng').value = pos.coords.longitude.toFixed(4);
      this.textContent = '📍 Lokasi Ditemukan!';
    }, () => {
      alert('Gagal mengambil lokasi. Aktifkan GPS.');
      this.textContent = '📍 Gunakan Lokasi Saya';
    });
  } else {
    alert('Browser tidak mendukung geolokasi.');
  }
});

// 4. ANALISIS JALUR (CORE LOGIC)
document.getElementById('btn-analyze').addEventListener('click', function() {
  try {
    const btn = this;
    btn.textContent = '⏳ Memproses...';
    btn.disabled = true;

    setTimeout(() => {
      // --- AMBIL DATA ---
      const kk = document.getElementById('kk').value;
      const asalSD = document.getElementById('asalSD').value;
      const tahunLulus = document.getElementById('tahunLulus').value;
      const prestasiNasional = document.getElementById('prestasiNasional').value === 'yes';
      
      // Nilai Akademik
      const tes1 = getVal('tes1');
      const tes2 = getVal('tes2');
      const tes3 = getVal('tes3');
      const totalTes = tes1 + tes2 + tes3;
      const nilaiPrestasi = getVal('prestasiNon');

      // Rapor (Rata-rata per mapel)
      const rapAgm = getVal('rapor_agama');
      const rapPnk = getVal('rapor_pancasila');
      const rapInd = getVal('rapor_indo');
      const rapMtk = getVal('rapor_mtk');
      const rapIpa = getVal('rapor_ipas');
      const sumRapor = rapAgm + rapPnk + rapInd + rapMtk + rapIpa;

      // Koordinat
      const lat = getVal('lat');
      const lng = getVal('lng');

      // --- HITUNG NILAI ---
      // Rumus NG: ((Tes x 90%) + (JmlRerataRapor x 0.6 x 10%)) + Prestasi
      const ng = (totalTes * 0.9) + (sumRapor * 0.6 * 0.1) + nilaiPrestasi;

      // Nilai Prestasi Umum (Tanpa Rapor): Tes + Prestasi
      const nilaiPrestasiUmum = totalTes + nilaiPrestasi;

      let output = '';

      // --- VALIDASI UMUM ---
      if (totalTes === 0) {
        output = `<div class="route denied"><div class="badge no">ERROR</div><h2>Mohon isi nilai akademik terlebih dahulu.</h2></div>`;
      } else {
        output = `<div class="route allowed"><div class="badge ok">✅ DATA VALID</div>`;
        output += `<p><strong>Estimasi Nilai Anda:</strong><br>NG Dasar: ${ng.toFixed(2)}<br>Nilai Prestasi Umum: ${nilaiPrestasiUmum.toFixed(2)}</p><hr>`;

        // === 1. DOMISILI RADIUS (Hanya KK Kota) ===
        if (kk === 'kota' && lat && lng) {
          // Cek apakah koordinat valid (di sekitar Jogja)
          // Jogja center approx: -7.79, 110.37. Max dist 15km.
          // Logic sederhana: Cek apakah lat/lng masuk range kasar
          const isJogja = lat > -8.0 && lat < -7.6 && lng > 110.2 && lng < 110.5;
          
          if (isJogja) {
            output += `<div class="route allowed"><div class="badge ok">BISA MENDAFTAR</div>`;
            output += `<h3>📍 Jalur Domisili Radius</h3>`;
            output += `<p>Anda memenuhi syarat lokasi. Seleksi berdasarkan jarak RW ke sekolah.</p>`;
            // Hitung jarak ke SMPN 1 sebagai contoh
            const dist = window.hitungJarak?.(lat, lng, -7.7956, 110.3695);
            if(dist) output += `<p>Estimasi jarak ke SMPN 1: ${Math.round(dist)} meter.</p>`;
            output += `</div>`;
          } else {
            output += `<div class="route denied"><div class="badge no">TIDAK BISA</div>`;
            output += `<h3>📍 Jalur Domisili Radius</h3>`;
            output += `<p>⚠️ Koordinat Anda tampaknya jauh dari wilayah Kota Yogyakarta.</p></div>`;
          }
        } else if (kk !== 'kota') {
           output += `<div class="route denied"><div class="badge no">TIDAK BISA</div><h3>📍 Jalur Domisili Radius</h3><p>Khusus pemegang KK Kota Yogyakarta.</p></div>`;
        }

        // === 2. DOMISILI DAERAH (KK Kota) ===
        if (kk === 'kota') {
          output += `<div class="route allowed"><div class="badge ok">BISA MENDAFTAR</div>`;
          output += `<h3>🏘️ Jalur Domisili Daerah</h3>`;
          output += `<p>Persaingan menggunakan NG: <strong>${ng.toFixed(2)}</strong></p>`;
          // Prediksi (jika engine tersedia)
          if (typeof KotaEngine?.predict === 'function') {
             const pred = KotaEngine.predict(ng, nilaiPrestasiUmum, 10);
             if(pred.domisili.length > 0) {
               output += `<p>Top Sekolah: ${pred.domisili[0].school} (Peluang: ${Math.round(pred.domisili[0].probD*100)}%)</p>`;
             }
          }
          output += `</div>`;
        }

        // === 3. PRESTASI KHUSUS ===
        if (prestasiNasional) {
           output += `<div class="route allowed"><div class="badge ok">BISA MENDAFTAR</div>`;
           output += `<h3>🏆 Jalur Prestasi Khusus (Nasional)</h3>`;
           output += `<p>Anda bisa mendaftar lewat jalur ini. Seleksi berdasarkan verifikasi sertifikat.</p></div>`;
        } else if (kk === 'kota' && asalSD === 'kota') {
           // Asumsi 10% terbaik (kita beri info saja)
           output += `<div class="route allowed"><div class="badge ok">POTENSIAL</div>`;
           output += `<h3>🏆 Jalur Prestasi Khusus (Akademik)</h3>`;
           output += `<p>Jika Anda masuk 10% terbaik di SD asal (Kota), Anda bisa mendaftar jalur ini.</p></div>`;
        }

        // === 4. PRESTASI UMUM (Luar Kota) ===
        if (kk !== 'kota') {
          output += `<div class="route allowed"><div class="badge ok">BISA MENDAFTAR</div>`;
          output += `<h3>🌍 Jalur Prestasi Umum</h3>`;
          output += `<p>Seleksi menggunakan nilai <strong>${nilaiPrestasiUmum.toFixed(2)}</strong> (Tanpa rapor). Kuota 10%.</p>`;
          if (typeof KotaEngine?.predict === 'function') {
             const pred = KotaEngine.predict(ng, nilaiPrestasiUmum, 10);
             if(pred.prestasi.length > 0) {
               output += `<p>Top Sekolah: ${pred.prestasi[0].school} (Peluang: ${Math.round(pred.prestasi[0].probP*100)}%)</p>`;
             }
          }
          output += `</div>`;
        }
        
        // === 5. AFIRMASI & MUTASI (Info Saja) ===
        output += `<div class="card"><h3>ℹ️ Jalur Lainnya</h3>
        <p>Jalur Afirmasi (KSJPS/Disabilitas) dan Mutasi Guru tersedia. Silakan cek Juknis resmi.</p></div>`;
      }

      document.getElementById('result').innerHTML = output;
      btn.textContent = '🔍 Analisis Jalur';
      btn.disabled = false;
    }, 500); // Delay simulasi
  } catch (e) {
    console.error(e);
    alert('Terjadi kesalahan sistem: ' + e.message);
  }
});

// Init
updateLabels();
document.getElementById('kk').dispatchEvent(new Event('change'));

</script>
</body>
</html>
