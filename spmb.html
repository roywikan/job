<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mengalihkan...</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; text-align: center; padding: 2rem; background: #f0fff4; color: #333; }
    .spinner { width: 40px; height: 40px; border: 4px solid #28a745; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 1.5rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #dc3545; font-weight: bold; margin-top: 1rem; }
    a { color: #155724; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p id="status-text">Membuka penawaran spesial...<br><small>Jika tidak terbuka, <a href="#" id="manual-link">klik di sini</a></small></p>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const rawDest = params.get('dest');
      const statusEl = document.getElementById('status-text');
      const spinnerEl = document.getElementById('spinner');
      const manualLink = document.getElementById('manual-link');

      // 1. Cek apakah parameter ada
      if (!rawDest) {
        statusEl.innerHTML = '<span class="error">⚠️ Link tujuan tidak ditemukan.<br>Gunakan format: af.html?dest=https://...</span>';
        spinnerEl.style.display = 'none';
        return;
      }

      // 2. Validasi & decode URL
      let targetUrl;
      try {
        const decoded = decodeURIComponent(rawDest);
        targetUrl = new URL(decoded);
        if (!['http:', 'https:'].includes(targetUrl.protocol)) throw new Error('Protocol tidak aman');
      } catch (e) {
        statusEl.innerHTML = '<span class="error">⚠️ URL tidak valid atau tidak didukung.</span>';
        spinnerEl.style.display = 'none';
        return;
      }

      // 3. Set link manual & redirect otomatis
      manualLink.href = targetUrl.href;
      
      // Delay 300ms agar halaman sempat dirender (menghindari flash of unstyled content)
      setTimeout(() => {
        window.location.href = targetUrl.href;
      }, 300);
    })();
  </script>
</body>
</html>
