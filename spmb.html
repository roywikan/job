<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mengalihkan...</title>
  <!-- Redirect otomatis -->
  <meta http-equiv="refresh" content="0;url=DESTINATION_URL">
  <script>
    // Fallback JS jika meta refresh gagal
    const params = new URLSearchParams(location.search);
    const dest = params.get('dest');
    if (dest) {
      setTimeout(() => { location.href = decodeURIComponent(dest); }, 100);
    }
  </script>
  <style>
    body { font-family:sans-serif; text-align:center; padding:2rem; background:#f0fff4; }
    .spinner { margin:1rem; width:40px; height:40px; border:4px solid #28a745; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite; margin:auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Membuka penawaran spesial... <br><small>Jika tidak terbuka, <a href="#" id="manual-link">klik di sini</a></small></p>
  <script>
    document.getElementById('manual-link').href = dest;
  </script>
</body>
</html>
